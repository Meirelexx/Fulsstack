<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet" href="/style.css">

</head>

<body>

    <h1>Login</h1>

    <form action="/resposta" method="POST">

        <input
            type="text"
            name="usuario"
            placeholder="Usuário"
            required
        >

        <br><br>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required
        >

        <br><br>

        <button type="submit">
            Entrar
        </button>

    </form>

</body>

</html>
